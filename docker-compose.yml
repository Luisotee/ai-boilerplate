services:
  # ============== Infrastructure ==============
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiagent-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aiagent}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: aiagent-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  adminer:
    image: adminer:latest
    container_name: aiagent-adminer
    restart: always
    profiles: ["dev"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aiagent-network

  # ============== Application Services ==============

  # All application services use env_file to inherit variables from .env.
  # The explicit 'environment' block below only contains container-specific
  # overrides (e.g. DATABASE_URL with Docker hostname instead of localhost).
  # Any variable in .env is automatically available; environment > env_file.

  api:
    image: aiagent-api:latest
    build:
      context: ./packages/ai-api
      dockerfile: Dockerfile
    container_name: aiagent-api
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aiagent}
      REDIS_HOST: redis
      KB_UPLOAD_DIR: /app/knowledge_base
      WHATSAPP_CLIENT_URL: http://whatsapp:3001
      WHATSAPP_CLOUD_CLIENT_URL: http://whatsapp-cloud:3002
    ports:
      - "8000:8000"
    volumes:
      - knowledge-base-data:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - aiagent-network

  worker:
    image: aiagent-api:latest
    build:
      context: ./packages/ai-api
      dockerfile: Dockerfile
    container_name: aiagent-worker
    command: ["python", "-m", "ai_api.scripts.run_stream_worker"]
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aiagent}
      REDIS_HOST: redis
      KB_UPLOAD_DIR: /app/knowledge_base
      WHATSAPP_CLIENT_URL: http://whatsapp:3001
      WHATSAPP_CLOUD_CLIENT_URL: http://whatsapp-cloud:3002
    volumes:
      - knowledge-base-data:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - aiagent-network

  whatsapp:
    build:
      context: .
      dockerfile: packages/whatsapp-client/Dockerfile
    container_name: aiagent-whatsapp
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      AI_API_URL: http://api:8000
      WHATSAPP_API_HOST: 0.0.0.0
    ports:
      - "3001:3001"
    volumes:
      - whatsapp-session:/app/packages/whatsapp-client/auth_info_baileys
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  whatsapp-cloud:
    build:
      context: .
      dockerfile: packages/whatsapp-cloud/Dockerfile
    container_name: aiagent-whatsapp-cloud
    restart: unless-stopped
    profiles: ["cloud"]
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      AI_API_URL: http://api:8000
      WHATSAPP_CLOUD_HOST: 0.0.0.0
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  postgres-data:
  redis-data:
  knowledge-base-data:
  whatsapp-session:

networks:
  aiagent-network:
    driver: bridge
