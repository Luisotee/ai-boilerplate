services:
  # ============== Infrastructure ==============
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aiagent-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-aiagent}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: aiagent-redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  adminer:
    image: adminer:latest
    container_name: aiagent-adminer
    restart: unless-stopped
    profiles: ["dev"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aiagent-network

  # ============== Application Services ==============

  # All application services use env_file to inherit variables from .env.
  # The explicit 'environment' block below only contains container-specific
  # overrides (e.g. DATABASE_URL with Docker hostname instead of localhost).
  # Any variable in .env is automatically available; environment > env_file.

  api:
    image: aiagent-api:latest
    build:
      context: ./packages/ai-api
      dockerfile: Dockerfile
      args:
        # Set INSTALL_DOCLING=true in your shell to bake the Docling fallback
        # into the image (adds ~1GB for poppler/tesseract + docling deps).
        INSTALL_DOCLING: "${INSTALL_DOCLING:-false}"
    container_name: aiagent-api
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aiagent}
      REDIS_HOST: redis
      KB_UPLOAD_DIR: /app/knowledge_base
      WHATSAPP_CLIENT_URL: http://whatsapp:3001
      WHATSAPP_CLOUD_CLIENT_URL: http://whatsapp-cloud:3002
    ports:
      - "8000:8000"
    volumes:
      - knowledge-base-data:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  worker:
    # Reuses the image built by the `api` service — `depends_on: api` below
    # guarantees the image exists before this container starts.
    image: aiagent-api:latest
    container_name: aiagent-worker
    command: ["python", "-m", "ai_api.scripts.run_stream_worker"]
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiagent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-aiagent}
      REDIS_HOST: redis
      KB_UPLOAD_DIR: /app/knowledge_base
      WHATSAPP_CLIENT_URL: http://whatsapp:3001
      WHATSAPP_CLOUD_CLIENT_URL: http://whatsapp-cloud:3002
    volumes:
      - knowledge-base-data:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.5"

  whatsapp:
    build:
      context: .
      dockerfile: packages/whatsapp-client/Dockerfile
    container_name: aiagent-whatsapp
    restart: unless-stopped
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      AI_API_URL: http://api:8000
      WHATSAPP_API_HOST: 0.0.0.0
    ports:
      - "3001:3001"
    volumes:
      - whatsapp-session:/app/packages/whatsapp-client/auth_info_baileys
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Self-hosted Whisper (OpenAI-compatible STT). Opt-in:
  #   docker compose --profile whisper up -d
  # Point the AI API at it by setting WHISPER_BASE_URL=http://whisper:8000 in .env.
  # Switch to `:latest-cuda` + uncomment the deploy.reservations block for GPU.
  whisper:
    image: ghcr.io/speaches-ai/speaches:latest-cpu
    container_name: aiagent-whisper
    restart: unless-stopped
    profiles: ["whisper"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:8771:8000"
    volumes:
      # speaches runs as non-root `ubuntu` with $HOME=/home/ubuntu — this
      # mount target must match or model downloads won't persist across restarts.
      - whisper-cache:/home/ubuntu/.cache/huggingface/hub
    environment:
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 8000
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      # speaches starts serving /health immediately, but models are NOT lazy-
      # loaded on first transcription (it returns 404 until a model is pulled).
      # The whisper-init sidecar below explicitly pulls WHISPER_MODEL once
      # whisper is healthy. start_period is generous to cover slow image pulls.
      start_period: 120s
      retries: 5
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2.0"
      # GPU (uncomment and switch image tag to `:latest-cuda`):
      # resources:
      #   reservations:
      #     devices:
      #       - driver: nvidia
      #         count: 1
      #         capabilities: [gpu]

  # One-shot sidecar that pulls the configured WHISPER_MODEL into the speaches
  # container. speaches does NOT lazy-download on first transcription — it
  # returns 404 until a model is registered via POST /v1/models/{id}. This
  # blocks `docker compose up` until the model is ready on a cold cache, and
  # is a fast no-op on warm starts (the volume keeps models across restarts).
  whisper-init:
    image: curlimages/curl:8.10.1
    container_name: aiagent-whisper-init
    profiles: ["whisper"]
    restart: "no"
    depends_on:
      whisper:
        condition: service_healthy
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-Systran/faster-distil-whisper-large-v3}
    command:
      - sh
      - -c
      - |
        set -e
        echo "Ensuring Whisper model '$${WHISPER_MODEL}' is downloaded (first run ~1-2 min)..."
        curl -fsS --max-time 600 -X POST "http://whisper:8000/v1/models/$${WHISPER_MODEL}"
        echo
        echo "Whisper model ready."
    networks:
      - aiagent-network

  whatsapp-cloud:
    build:
      context: .
      dockerfile: packages/whatsapp-cloud/Dockerfile
    container_name: aiagent-whatsapp-cloud
    restart: unless-stopped
    profiles: ["cloud"]
    env_file: .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      AI_API_URL: http://api:8000
      WHATSAPP_CLOUD_HOST: 0.0.0.0
    ports:
      - "3002:3002"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - aiagent-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  postgres-data:
  redis-data:
  knowledge-base-data:
  whatsapp-session:
  whisper-cache:

networks:
  aiagent-network:
    driver: bridge
